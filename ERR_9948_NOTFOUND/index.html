        /* Fade-in animation */
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        /* Apply fade-in on page load */
        body {
            animation: fadeIn 0.5s ease-in-out;
            background: linear-gradient(135deg, #2B3A42, #3C4A58); /* Darker gradient */
            color: #E0E0E0; /* Light text on dark background */

        /* Overlay style */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent dark background */
    opacity: 0; /* Initially invisible */
    pointer-events: none; /* Prevent interaction with the overlay */
    z-index: 999; /* Placed below the search bar */
    transition: opacity 0.5s ease; /* Smooth fade-in and fade-out */
}

/* Search bar style */
.search-bar {
    position: fixed;
    top: -100px; /* Initially hidden above the screen */
    left: 0;
    width: 100%;
    padding: 20px;
    text-align: center;
    z-index: 1000;
    transition: top 0.5s ease; /* Smooth transition for movement */
}

/* Input field inside the search bar */
.search-bar input {
    padding: 12px 20px;
    width: 500px;
    font-size: 18px;
    border-radius: 30px;
    border: 1px none #ccc;
    background: linear-gradient(135deg, #9b59b6, #6a1b9a);
    color: white;
    outline: none;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
}

/* Placeholder text style */
.search-bar input::placeholder {
    color: white;
}

/* Focused input field style */
.search-bar input:focus {
    border: 1px solid #8e44ad;
    box-shadow: 0 4px 12px rgba(142, 68, 173, 0.3);
}

/* History items style */
#history {
    margin-top: 20px;  /* Spacing between search bar and history */
    max-width: 400px;  /* Smaller width */
    margin-left: auto;
    margin-right: auto;
    display: none; /* Initially hide the history */
    opacity: 0; /* Initially invisible */
    transition: opacity 0.6s ease-out; /* Smooth fade-in/fade-out transition */
}

/* Individual search history item */
.history-item {
    margin-top: 8px;
    padding: 10px 18px; /* Reduced padding for a more compact look */
    border: 1px solid transparent;
    background: linear-gradient(145deg, #9b59b6, #6a1b9a);
    color: white;
    border-radius: 30px; /* Slightly smaller border radius */
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background-color 0.4s ease, transform 0.3s ease, box-shadow 0.4s ease;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
}

/* Delete button for each history item */
.delete-btn {
    background-color: transparent;
    border: none;
    color: white;
    font-size: 16px; /* Smaller font size */
    font-weight: bold;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 50%;
    transition: background-color 0.3s ease, transform 0.3s ease;
}

.delete-btn:hover {
    background-color: #e74c3c;
    transform: scale(1.1); /* Slight zoom effect */
}

/* Hover effect on history item */
.history-item:hover {
    background-color: #8e44ad;
    transform: scale(1.05);
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15); /* Reduced shadow for a more compact feel */
}

/* Active item click effect */
.history-item:active {
    background-color: #6a1b9a;
    transform: scale(0.98); /* Slight shrink effect */
}

/* Smooth fade-in for history list */
#history.show {
    opacity: 1;
}

/* Add a subtle pulse animation for the delete button */
.delete-btn:active {
    transform: scale(0.95);
}


/* Responsive history container */
@media screen and (max-width: 600px) {
    .search-bar input {
        width: 80%;
    }

    .history-item {
        width: 80%;
        margin-left: auto;
        margin-right: auto;
    }
}

  // Flag to prevent form submission
  let isFormSubmitted = false;

// Function to allow hitting Enter multiple times without blocking submission
function submitOnce(event) {
    if (event.key === 'Enter') {
        event.preventDefault();  // Prevent the default form submission behavior
        
        const searchQuery = event.target.value;
        if (searchQuery.trim() !== "") {
            saveSearchHistory(searchQuery);  // Save the search history
            searchOnGoogle(searchQuery);    // Perform Google search
        }
    }
}

// Function to save the search history in localStorage and update the display
function saveSearchHistory(searchQuery) {
    let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
    if (!history.includes(searchQuery)) {
        history.push(searchQuery);  // Add the new search term to the history array
        if (history.length > 5) {  // Keep only the last 5 searches
            history.shift();
        }
        localStorage.setItem('searchHistory', JSON.stringify(history));  // Save to localStorage
        displaySearchHistory(history);  // Update the displayed history
    }
}

// Function to display search history below the search bar
function displaySearchHistory(history) {
    const historyContainer = document.getElementById('history');
    historyContainer.innerHTML = "";  // Clear previous history

    history.forEach(function(query, index) {
        const historyItem = document.createElement('div');
        historyItem.classList.add('history-item');

        const historyText = document.createElement('span');
        historyText.textContent = query;
        historyItem.appendChild(historyText);

        // Create a delete button ('X') for each history item
        const deleteButton = document.createElement('span');
        deleteButton.textContent = 'X';
        deleteButton.classList.add('delete-btn');
        deleteButton.onclick = function(event) {
            event.stopPropagation();  // Prevent triggering search when X is clicked
            deleteHistoryItem(index);  // Delete the clicked history item
        };

        historyItem.appendChild(deleteButton);
        historyContainer.appendChild(historyItem);

        // Add click event to search for the clicked history item
        historyItem.onclick = function() {
            searchOnGoogle(query);
        };
    });
}

// Function to delete a history item
function deleteHistoryItem(index) {
    let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
    history.splice(index, 1);  // Remove the item at the specified index
    localStorage.setItem('searchHistory', JSON.stringify(history));  // Save the updated history
    displaySearchHistory(history);  // Update the displayed history
}

// Function to perform Google search
function searchOnGoogle(query) {
    const googleSearchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
    window.open(googleSearchUrl, '_blank');
}

// Load and display history from localStorage on page load
window.onload = function() {
    const history = JSON.parse(localStorage.getItem('searchHistory')) || [];
    displaySearchHistory(history);
};

// Add event listener for keydown event to handle Ctrl + I

        const overlay = document.querySelector('.overlay');

        const historyContainer = document.getElementById('history');

        if (searchBar.style.top === '20px') {
            // Move search bar up, fade out the overlay, and fade out history simultaneously
            searchBar.style.top = '-100px';

            historyContainer.style.opacity = '0'; // Fade out history immediately
            setTimeout(() => { historyContainer.style.display = 'none'; }, 500); // Hide history after fade-out

            // Move search bar down, fade in the overlay, and show history
            searchBar.style.top = '20px';
            overlay.style.opacity = '1';
            historyContainer.style.display = 'block'; // Show history
            setTimeout(() => { historyContainer.style.opacity = '1'; }, 10); // Fade in history immediately

        }
    }
});
